<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WesternLocate • Western Region Ghana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .chat-bg { background: #0f172a; }
        .message-bubble { max-width: 88%; animation: fadeInUp 0.3s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .user-bubble { background: linear-gradient(135deg, #6366f1, #818cf8); color: white; border-radius: 20px 20px 4px 20px; }
        .bot-bubble { background: #1e293b; border: 1px solid #475569; border-radius: 20px 20px 20px 4px; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 20px; }
    </style>
</head>
<body class="chat-bg text-[#f8fafc] h-screen flex flex-col overflow-hidden">
    <!-- Top Navigation -->
    <nav class="bg-[#1e293b] border-b border-slate-700 px-6 py-3 flex items-center justify-between z-50">
        <div class="flex items-center gap-x-3">
            <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fas fa-globe text-white text-4xl"></i>
            </div>
            <div>
                <span class="text-3xl font-bold tracking-tighter">WesternLocate</span>
                <span class="text-indigo-400 text-sm font-medium tracking-widest block -mt-1">WESTERN REGION GHANA</span>
            </div>
        </div>

        <div class="flex items-center gap-x-4">
            <!-- Dark/Light Mode Toggle -->
            <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-800 rounded-full transition-all">
                <i class="fas fa-adjust text-lg"></i>
            </button>

            <div class="hidden md:flex items-center gap-x-2 bg-slate-800 rounded-full pl-3 pr-5 py-1.5">
                <div class="w-9 h-9 bg-indigo-600 rounded-full flex items-center justify-center text-white text-sm font-bold">
                    {{ username[0].upper() }}
                </div>
                <div>
                    <div class="font-medium text-sm">{{ username }}</div>
                    <div class="text-[10px] text-indigo-400">Western Region Explorer</div>
                </div>
            </div>
            
            <button onclick="logout()" class="px-4 py-2 text-sm bg-slate-800 hover:bg-red-600 rounded-full transition-colors flex items-center gap-x-2">
                <i class="fas fa-sign-out-alt"></i>
                <span class="hidden md:inline">Logout</span>
            </button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <div class="w-72 bg-[#1e293b] border-r border-slate-700 flex flex-col hidden lg:flex">
            <div class="p-4 border-b border-slate-700">
                <button onclick="startNewChat()" class="w-full flex items-center justify-center gap-x-2 bg-indigo-600 hover:bg-indigo-500 transition-all text-white py-3 rounded-2xl font-semibold text-sm shadow-lg active:scale-[0.985]">
                    <i class="fas fa-plus"></i>
                    <span>New Conversation</span>
                </button>
            </div>
            
            <div class="px-4 py-3 flex items-center justify-between text-xs uppercase tracking-widest text-slate-500 font-medium">
                <span>Recent Journeys</span>
                <span id="conv-count" class="bg-slate-800 px-2 py-0.5 rounded-full">0</span>
            </div>
            
            <div id="conversation-list" class="flex-1 overflow-y-auto px-2 space-y-1 chat-container"></div>
        </div>

        <!-- Main Chat -->
        <div class="flex-1 flex flex-col relative">
            <div class="bg-[#1e293b] border-b border-slate-700 px-6 py-3 flex items-center justify-between">
                <div>
                    <div class="font-semibold text-xl flex items-center gap-x-2">
                        <span id="chat-title">New Journey</span>
                    </div>
                    <div class="text-xs text-slate-400">Western Region Ghana • Tourist Sites • Culture • Services</div>
                </div>
                
                <button onclick="showQuickActions()" class="px-5 py-2 text-sm flex items-center gap-x-2 bg-slate-800 hover:bg-indigo-600 hover:text-white rounded-full transition-all">
                    <i class="fas fa-magic"></i>
                    <span class="hidden md:inline">Quick Actions</span>
                </button>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 chat-container space-y-6 bg-[#0f172a]"></div>

            <div class="border-t border-slate-700 bg-[#1e293b] p-4">
                <div class="max-w-4xl mx-auto flex items-end gap-x-3">
                    <button onclick="startVoiceInput()" class="w-12 h-12 flex-shrink-0 bg-slate-800 hover:bg-indigo-600 text-indigo-400 hover:text-white rounded-2xl flex items-center justify-center transition-all">
                        <i class="fas fa-microphone text-xl"></i>
                    </button>
                    
                    <div class="flex-1 relative">
                        <textarea id="message-input" rows="1" class="w-full resize-none bg-slate-800 border border-slate-700 focus:border-indigo-500 rounded-3xl py-4 px-6 text-white placeholder-slate-400 focus:outline-none" 
                                  placeholder="Ask about Kundum Festival, best beaches, schools, or hospitals..." 
                                  onkeydown="if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"></textarea>
                        
                        <button onclick="sendMessage()" class="absolute right-3 bottom-3 bg-indigo-600 hover:bg-indigo-500 text-white w-9 h-9 rounded-2xl flex items-center justify-center shadow-lg transition-all active:scale-95">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions Modal -->
    <div id="quick-actions-modal" onclick="hideQuickActions()" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-end lg:items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-[#1e293b] w-full lg:w-[540px] rounded-t-3xl lg:rounded-3xl p-6 border border-slate-700">
            <div class="flex justify-between items-center mb-5">
                <h3 class="font-semibold text-xl">Quick Actions - Western Region Ghana</h3>
                <button onclick="hideQuickActions()" class="text-slate-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="grid grid-cols-1 gap-3 text-sm">
                <button onclick="quickAction('Tell me about the Kundum Festival in Western Region Ghana')" class="quick-action-btn text-left p-4 bg-slate-800 hover:bg-indigo-600 hover:text-white rounded-2xl border border-slate-700 transition-all">🎉 Kundum Festival</button>
                <button onclick="quickAction('Best beaches in Western Region Ghana')" class="quick-action-btn text-left p-4 bg-slate-800 hover:bg-indigo-600 hover:text-white rounded-2xl border border-slate-700 transition-all">🏖️ Best Beaches</button>
                <button onclick="quickAction('Top hotels in Takoradi')" class="quick-action-btn text-left p-4 bg-slate-800 hover:bg-indigo-600 hover:text-white rounded-2xl border border-slate-700 transition-all">🏨 Best Hotels in Takoradi</button>
                <button onclick="quickAction('Schools and universities in Western Region Ghana')" class="quick-action-btn text-left p-4 bg-slate-800 hover:bg-indigo-600 hover:text-white rounded-2xl border border-slate-700 transition-all">🎓 Schools & Universities</button>
                <button onclick="quickAction('Hospitals and clinics in Takoradi and Axim')" class="quick-action-btn text-left p-4 bg-slate-800 hover:bg-indigo-600 hover:text-white rounded-2xl border border-slate-700 transition-all">🏥 Hospitals</button>
            </div>
        </div>
    </div>

    <script>
        let currentConversationId = null;
        let isTyping = false;
        let isDarkMode = true;

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            const body = document.body;
            
            if (isDarkMode) {
                // DARK MODE
                body.classList.add('chat-bg');
                body.classList.remove('bg-slate-100', 'text-slate-900');
                body.style.color = '#f8fafc';
            } else {
                // LIGHT MODE
                body.classList.remove('chat-bg');
                body.classList.add('bg-slate-100', 'text-slate-900');
                body.style.color = '#0f172a';
            }
        }

        // All other JavaScript functions remain the same

        async function loadConversations() {
            try {
                const res = await fetch('/api/conversations');
                const convos = await res.json();
                const container = document.getElementById('conversation-list');
                container.innerHTML = '';
                document.getElementById('conv-count').innerText = convos.length;
                
                if (convos.length === 0) {
                    container.innerHTML = `<div class="px-4 py-8 text-center"><i class="fas fa-comments text-4xl text-slate-700 mb-3"></i><p class="text-sm text-slate-500">No conversations yet.<br>Start a new journey!</p></div>`;
                    return;
                }
                
                convos.forEach(conv => {
                    const div = document.createElement('div');
                    div.className = `px-3 py-3 mx-1 rounded-2xl cursor-pointer hover:bg-slate-800 flex items-start gap-x-3 transition-colors ${currentConversationId === conv.id ? 'bg-slate-800' : ''}`;
                    div.innerHTML = `<div class="flex-1 min-w-0"><div class="font-medium text-sm truncate">${conv.title}</div><div class="text-xs text-slate-500">${new Date(conv.updated_at).toLocaleDateString()}</div></div>`;
                    div.onclick = () => loadConversation(conv.id);
                    container.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        async function loadConversation(convId) {
            currentConversationId = convId;
            try {
                const res = await fetch(`/api/conversation/${convId}`);
                const data = await res.json();
                document.getElementById('chat-title').innerText = data.title;
                const messagesContainer = document.getElementById('chat-messages');
                messagesContainer.innerHTML = '';
                data.messages.forEach(msg => addMessageToUI(msg.role, msg.content, false));
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } catch (e) { console.error(e); }
        }

        function addMessageToUI(role, content, animate = true) {
            const container = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} ${animate ? 'message-bubble' : ''}`;
            
            if (role === 'user') {
                messageDiv.innerHTML = `<div class="user-bubble px-5 py-3.5 text-[15px] shadow-md"><div class="prose prose-invert max-w-none">${marked.parse(content)}</div></div>`;
            } else {
                let formattedContent = marked.parse(content);
                messageDiv.innerHTML = `
                    <div class="flex gap-x-3 max-w-[90%]">
                        <div class="w-9 h-9 bg-indigo-600 rounded-2xl flex-shrink-0 flex items-center justify-center mt-1"><i class="fas fa-globe text-white text-lg"></i></div>
                        <div class="bot-bubble px-5 py-4 text-[15px] flex-1">
                            <div class="markdown-content prose prose-invert prose-sm max-w-none">${formattedContent}</div>
                        </div>
                    </div>`;
            }
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage(preFilledMessage = null, isRegenerate = false) {
            const input = document.getElementById('message-input');
            const message = preFilledMessage || input.value.trim();
            if (!message || isTyping) return;
            
            addMessageToUI('user', message);
            if (!preFilledMessage) input.value = '';
            
            isTyping = true;
            const typingDiv = showTypingIndicator();
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, conversation_id: currentConversationId })
                });
                const data = await res.json();
                typingDiv.remove();
                isTyping = false;
                addMessageToUI('assistant', data.response);
                
                if (data.is_new || !currentConversationId) {
                    currentConversationId = data.conversation_id;
                    await loadConversations();
                    const titleEl = document.getElementById('chat-title');
                    if (titleEl.innerText === 'New Journey') {
                        titleEl.innerText = message.length > 35 ? message.substring(0, 32) + '...' : message;
                    }
                }
                await loadConversations();
            } catch (error) {
                typingDiv.remove();
                isTyping = false;
                addMessageToUI('assistant', "Sorry, I'm having trouble connecting. Please try again! 🌍");
            }
        }

        function showTypingIndicator() {
            const container = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'flex justify-start message-bubble';
            typingDiv.innerHTML = `
                <div class="flex gap-x-3 max-w-[70%]">
                    <div class="w-9 h-9 bg-indigo-600 rounded-2xl flex-shrink-0 flex items-center justify-center mt-1"><i class="fas fa-globe text-white text-lg"></i></div>
                    <div class="bot-bubble px-5 py-4 flex items-center">
                        <div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
                        <span class="ml-3 text-xs text-slate-400">WesternLocate is exploring...</span>
                    </div>
                </div>`;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
            return typingDiv;
        }

        function startVoiceInput() {
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                alert("Voice input isn't supported. Try Chrome or Edge!");
                return;
            }
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            recognition.onresult = (event) => {
                document.getElementById('message-input').value = event.results[0][0].transcript;
                setTimeout(() => sendMessage(), 600);
            };
            recognition.onerror = (event) => alert("Voice error: " + event.error);
            recognition.start();
        }

        function startNewChat() {
            currentConversationId = null;
            document.getElementById('chat-title').innerText = 'New Journey';
            document.getElementById('chat-messages').innerHTML = '';
            showWelcomeMessage();
            document.querySelectorAll('#conversation-list > div').forEach(el => el.classList.remove('bg-slate-800'));
        }

        function showWelcomeMessage() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = `
                <div class="max-w-2xl mx-auto text-center py-10">
                    <div class="w-20 h-20 bg-indigo-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fas fa-globe text-indigo-400 text-5xl"></i>
                    </div>
                    <h2 class="text-3xl font-semibold mb-3">Welcome to WesternLocate</h2>
                    <p class="text-slate-400 max-w-md mx-auto">Your intelligent guide to the Western Region of Ghana.</p>
                </div>`;
        }

        function quickAction(prompt) {
            hideQuickActions();
            if (!currentConversationId) document.getElementById('chat-messages').innerHTML = '';
            addMessageToUI('user', prompt);
            document.getElementById('chat-title').innerText = prompt.length > 40 ? prompt.substring(0, 37) + '...' : prompt;
            const typingDiv = showTypingIndicator();
            
            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: prompt, conversation_id: currentConversationId })
            })
            .then(res => res.json())
            .then(data => {
                typingDiv.remove();
                addMessageToUI('assistant', data.response);
                if (data.is_new || !currentConversationId) {
                    currentConversationId = data.conversation_id;
                    loadConversations();
                }
            })
            .catch(() => {
                typingDiv.remove();
                addMessageToUI('assistant', "Sorry, something went wrong.");
            });
        }

        function showQuickActions() {
            document.getElementById('quick-actions-modal').classList.remove('hidden');
            document.getElementById('quick-actions-modal').classList.add('flex');
        }

        function hideQuickActions() {
            const modal = document.getElementById('quick-actions-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        async function logout() {
            await fetch('/logout');
            window.location.href = '/login';
        }

        function initializeChat() {
            loadConversations();
            showWelcomeMessage();
            setTimeout(() => document.getElementById('message-input').focus(), 800);
            console.log('%c[WesternLocate] Final readable version applied', 'color:#6366f1');
        }

        window.onload = initializeChat;
    </script>
</body>
</html>
